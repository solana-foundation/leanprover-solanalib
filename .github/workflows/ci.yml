name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the toolchain pinned in lean-toolchain, fetches the Mathlib
      # olean cache (since Mathlib is a require), and runs `lake build`.
      - uses: leanprover/lean-action@v1
