name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Textual style checks
        run: ./scripts/lint-style.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # ~/.elan holds the Lean toolchain (~200MB); .lake/packages holds every
      # dep clone + their pre-built oleans (~1GB with Mathlib). Both are stable
      # against any change that doesn't touch lake-manifest.json or lean-
      # toolchain, so cache aggressively keyed on those two files.
      - name: Cache Lean toolchain and Lake deps
        id: cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.elan
            .lake/packages
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Install elan (Lean toolchain manager)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none

      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # On a warm cache .lake/packages is already populated; lake just verifies
      # the manifest matches and exits in ~1s. On a cold cache it does the full
      # 100s+ clone of every dep.
      - name: Resolve dependencies
        run: lake update

      - name: Fetch pre-built Mathlib oleans
        run: lake exe cache get

      - name: Build library
        run: |
          set -o pipefail
          lake build 2>&1 | tee build.log

      - name: Fail on warnings in Solanalib source
        run: |
          # Treat any Lean warning emitted for a Solanalib*/ source file as a
          # build failure. External-library warnings (e.g. Mathlib's own
          # deprecation messages) are ignored — they're not actionable here.
          if grep -E '^warning: (Solanalib|SolanalibTest)/' build.log; then
            echo "::error::lake build produced warnings on Solanalib source"
            exit 1
          fi

      - name: Run tests
        run: lake test
