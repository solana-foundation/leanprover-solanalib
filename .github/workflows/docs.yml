name: Docs

on:
  push:
    branches: [main]
    # Only rebuild docs when something the rendered site actually depends on
    # changes. Allowlist over blocklist: a new top-level file is skipped by
    # default rather than silently triggering a 10-minute Docs build.
    paths:
      - "Solanalib/**"
      - "Solanalib.lean"
      - "lakefile.lean"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache Lean toolchain + Lake deps + doc-gen4's own build output. Without
      # this cache the doc-gen4 compile from source dominates the build at ~10
      # minutes. Cache key includes the doc-gen4 commit (resolved into the
      # manifest) so a doc-gen4 bump invalidates the cache.
      - name: Cache Lean toolchain and Lake deps
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake/packages
          key: lake-docs-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-docs-${{ runner.os }}-
            lake-${{ runner.os }}-

      - name: Install elan (Lean toolchain manager)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none

      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # Pulls doc-gen4 into the manifest (gated behind -Kenv=dev in lakefile.lean).
      - name: Resolve dependencies with -Kenv=dev
        run: lake -Kenv=dev update

      # Downloads pre-built Mathlib oleans so we don't compile Mathlib from scratch.
      - name: Fetch pre-built Mathlib oleans
        run: lake exe cache get

      - name: Build documentation site
        run: lake -Kenv=dev build Solanalib:docs

      - name: Patch landing page (banner + title + module nav)
        run: python3 scripts/postprocess-docs.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .lake/build/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
