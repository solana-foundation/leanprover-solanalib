name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install elan (Lean toolchain manager)
        run: |
          set -euxo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # Pulls doc-gen4 into the manifest (gated behind -Kenv=dev in lakefile.lean).
      - name: Resolve dependencies with -Kenv=dev
        run: lake -Kenv=dev update

      # Downloads pre-built Mathlib oleans so we don't compile Mathlib from scratch.
      - name: Fetch pre-built Mathlib oleans
        run: lake exe cache get

      - name: Build documentation site
        run: lake -Kenv=dev build Solanalib:docs

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: .lake/build/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
